<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin 6.0 - Quản trị lớp 5/3</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body{background:#f1f5f9;margin:0;font-family:Arial,sans-serif;color:#111827}.admin-wrap{max-width:1180px;margin:36px auto;background:#fff;padding:28px;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.08)}.login-box{max-width:420px;margin:70px auto;background:#fff;padding:30px;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.08)}h1,h2{color:#006b3c}.muted{color:#6b7280}.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}input,select,textarea{width:100%;box-sizing:border-box;padding:12px;border:1px solid #cbd5e1;border-radius:10px;margin:8px 0 14px;font-size:15px}textarea{min-height:110px}.btn{border:0;border-radius:10px;padding:11px 16px;font-weight:700;cursor:pointer;background:#f59e0b;color:#fff;margin:4px}.btn.green{background:#059669}.btn.red{background:#ef4444}.btn.gray{background:#64748b}.btn.blue{background:#2563eb}.btn.small{padding:7px 10px;font-size:13px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}.tab{background:#f59e0b;color:white;border:0;border-radius:10px;padding:11px 14px;font-weight:700;cursor:pointer}.tab.active{background:#006b3c}.form-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:16px;padding:18px;margin:16px 0}.drop-zone{border:2px dashed #10b981;background:#ecfdf5;border-radius:16px;padding:24px;text-align:center;color:#065f46;font-weight:700}.list-item{background:#f0fdf4;border-left:6px solid #059669;border-radius:14px;padding:14px;margin:10px 0;display:flex;justify-content:space-between;gap:12px}.badge{display:inline-block;background:#fef3c7;color:#92400e;padding:4px 8px;border-radius:999px;font-size:12px;margin:3px}.actions{min-width:220px;text-align:right}.preview-img{width:90px;height:70px;object-fit:cover;border-radius:8px;margin-right:8px}.admin-header{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}@media(max-width:720px){.row{grid-template-columns:1fr}.list-item{display:block}.actions{text-align:left;min-width:auto}}
  </style>
</head>
<body>
  <div id="loginBox" class="login-box">
    <h2>🔐 Đăng nhập quản trị</h2>
    <p class="muted">Chỉ giáo viên quản trị mới được đăng nội dung.</p>
    <input id="adminUser" placeholder="Tài khoản" />
    <input id="adminPass" type="password" placeholder="Mật khẩu" />
    <button class="btn green" onclick="dangNhapAdmin()">Đăng nhập</button>
    <p id="loginMsg"></p>
  </div>

  <div id="adminApp" class="admin-wrap" style="display:none">
    <div class="admin-header">
      <div><h1>🛠️ Admin 6.0 - Cổng thông tin lớp 5/3</h1><p class="muted">Quản lý thông báo, lịch học, tài liệu, hoạt động lớp, năm học và thùng rác.</p></div>
      <button class="btn gray" onclick="dangXuatAdmin()">Đăng xuất</button>
    </div>

    <div id="dashboard" class="admin-dashboard-grid"></div>

    <div class="tabs">
      <button class="tab active" onclick="chonLoai('thong_bao', this)">📢 Thông báo</button>
      <button class="tab" onclick="chonLoai('lich_hoc', this)">📅 Lịch học</button>
      <button class="tab" onclick="chonLoai('tai_lieu', this)">📚 Tài liệu</button>
      <button class="tab" onclick="chonLoai('hoat_dong_lop', this)">🎉 Hoạt động lớp</button>
      <button class="tab" onclick="chonLoai('nam_hoc', this)">🏫 Năm học</button>
      <button class="tab" onclick="chonLoai('trash', this)">🗑️ Thùng rác</button>
    </div>

    <div class="form-card" id="formCard">
      <h2 id="formTitle">📢 Quản lý thông báo</h2>
      <input type="hidden" id="editId" />
      <div class="row">
        <div><label>Tiêu đề</label><input id="tieuDe" placeholder="Nhập tiêu đề hiển thị" /></div>
        <div><label>Năm học</label><select id="namHoc"><option value="2025-2026">2025-2026 | Lớp 5/3</option><option value="2024-2025">2024-2025 | Lớp 3/1</option><option value="2023-2024">2023-2024 | Lớp 5/2</option><option value="2022-2023">2022-2023 | Lớp 5/2</option><option value="2021-2022">2021-2022 | Lớp 5/1</option></select></div>
      </div>
      <div id="noiDungWrap"><label>Nội dung</label><textarea id="noiDung" placeholder="Nhập nội dung"></textarea></div>
      <div id="ngayWrap" style="display:none"><label>Ngày</label><input type="date" id="ngayHoc" /></div>
      <div id="hoatDongWrap" style="display:none">
        <div class="row"><div><label>Loại hoạt động</label><select id="loaiHoatDong"><option value="anh">📸 Ảnh</option><option value="video">🎬 Video YouTube/MP4</option><option value="link">🔗 Link</option></select></div><div><label>Album/Sự kiện</label><input id="album" placeholder="Khai giảng, 20/11, STEM..." /></div></div>
        <label>Link YouTube / Google Drive / Website / Facebook</label><input id="linkHoatDong" placeholder="Dán link nếu có" />
      </div>
      <div id="namHocWrap" style="display:none" class="row"><div><label>Lớp</label><input id="lop" placeholder="Ví dụ: 5/3" /></div><div><label>Trạng thái</label><input id="trangThai" placeholder="Năm học hiện tại / Đã lưu trữ" /></div></div>
      <label><input type="checkbox" id="noiBat" style="width:auto;margin-right:6px" />📌 Ghim làm tin nổi bật</label>
      <div id="fileWrap"><label>File/Ảnh/Video đính kèm</label><div class="drop-zone">Chọn file hoặc nhiều ảnh/video cùng lúc<input id="fileUpload" type="file" multiple style="display:block;margin:12px auto 0;max-width:430px" /></div></div>
      <button class="btn green" onclick="luuNoiDungV6()">💾 Lưu nội dung</button><button class="btn blue" onclick="lamMoiForm()">🔄 Làm mới</button><p id="adminStatus"></p>
    </div>

    <h2 id="listTitle">📂 Danh sách nội dung</h2>
    <div id="adminList"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
